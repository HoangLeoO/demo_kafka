spring.application.name=demo_kafka

# ============================================================
#  KẾT NỐI KAFKA
#  Kafka đang chạy trên Docker ở port 9092
# ============================================================
spring.kafka.bootstrap-servers=localhost:9092

# --- PRODUCER (người gửi tin nhắn) ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
# Mặc định Kafka dùng "Sticky Partitioner": gom message gần cùng lúc vào 1 batch → 1 partition
# → Đặt RoundRobinPartitioner để demo thấy message phân phối đều vào 3 partitions
spring.kafka.producer.properties.partitioner.class=org.apache.kafka.clients.producer.RoundRobinPartitioner

# --- CONSUMER (người nhận tin nhắn) ---
spring.kafka.consumer.group-id=demo-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# auto-offset-reset = earliest: đọc từ tin nhắn đầu tiên nếu group mới
spring.kafka.consumer.auto-offset-reset=earliest

# --- PORT của Spring Boot ---
server.port=8081
